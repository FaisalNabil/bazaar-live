name: Daily Price Scraper

on:
  schedule:
    # Runs every day at 06:00 UTC (12:00 noon Bangladesh time)
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  scrape:
    name: Scrape prices and commit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write  # needed to commit prices.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system dependencies for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libdbus-1-3 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64 libpango-1.0-0 \
            libcairo2 libglib2.0-0 libx11-6 libx11-xcb1 libxcb1 \
            libxext6 fonts-liberation wget

      - name: Install Node dependencies
        run: npm install

      - name: Run scraper
        run: npm run scrape
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: false

      - name: Check if prices.json changed
        id: diff
        run: |
          git diff --quiet data/prices.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated prices
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config --global user.name "price-bot"
          git config --global user.email "price-bot@users.noreply.github.com"
          git add data/prices.json
          git commit -m "chore: update prices [$(date -u '+%Y-%m-%d')]"
          git push

      - name: No changes detected
        if: steps.diff.outputs.changed == 'false'
        run: echo "prices.json unchanged — nothing to commit"
